<div class="site-notice-wrapper">
    <div class="container">
        <section class="site-notice" role="note" aria-label="当前时间">
            <div class="site-notice-heading" style="flex-direction: column; align-items: center; justify-content: center; text-align: center;">
                <strong>当前时间</strong>
                <span id="site-current-time">加载中...</span>
            </div>
        </section>
    </div>
</div>
<script>
    (function () {
        const timeElement = document.getElementById("site-current-time");
        if (!timeElement) {
            return;
        }

        const formatter = new Intl.DateTimeFormat("zh-CN", {
            year: "numeric",
            month: "2-digit",
            day: "2-digit",
            hour: "2-digit",
            minute: "2-digit",
            second: "2-digit",
            hour12: false,
        });

        const updateCurrentTime = function () {
            timeElement.textContent = formatter.format(new Date());
        };

        updateCurrentTime();
        window.setInterval(updateCurrentTime, 1000);
    })();
</script>
